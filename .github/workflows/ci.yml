name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node-version: [18, 20, 22]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      
      - name: Verify CLI runs
        run: node bin/cli.js > /dev/null
      
      - name: Test non-interactive mode
        run: node bin/cli.js > output.txt
      
      - name: Verify output
        run: |
          if [ -s output.txt ]; then
            echo "✓ CLI produced output"
          else
            echo "✗ CLI produced no output"
            exit 1
          fi

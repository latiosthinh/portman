<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Local Port Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
    .material-symbols-outlined.filled {
      font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      padding: 2rem;
      transition: all 0.3s ease;
    }

    body.widget-mode {
      background: transparent;
      padding: 0;
      min-height: auto;
      overflow: hidden;
      cursor: move;
      user-select: none;
      --kin-surface: #131314;
      --kin-surface-container-lowest: #0e0e0f;
      --kin-surface-container-low: #1c1b1c;
      --kin-surface-container: #201f20;
      --kin-surface-container-high: #2a2a2b;
      --kin-surface-container-highest: #353436;
      --kin-primary: #75ff9e;
      --kin-primary-container: #00e676;
      --kin-on-primary: #003918;
      --kin-on-primary-container: #00612e;
      --kin-on-surface: #e5e2e3;
      --kin-on-surface-variant: #bacbb9;
      --kin-secondary: #ffb3ae;
      --kin-secondary-container: #a00118;
      --kin-on-secondary-container: #ffa8a3;
      --kin-outline-variant: #3b4a3d;
      --kin-surface-bright: #3a393a;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      transition: max-width 0.3s;
    }

    body.widget-mode .container {
      max-width: 100%;
      background: var(--kin-surface-container-low);
      border-radius: 0.5rem;
      padding: 0;
      box-shadow: 0 20px 40px rgba(0,0,0,0.4);
      outline: 1px solid rgba(59, 74, 61, 0.15);
      overflow: hidden;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2rem;
    }

    body.widget-mode .widget-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 1.25rem;
      border-bottom: 1px solid rgba(59, 74, 61, 0.1);
      cursor: grab;
    }

    body.widget-mode .widget-header:active {
      cursor: grabbing;
    }

    body.widget-mode .widget-header .widget-title {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    body.widget-mode .widget-header .widget-title .pulse-dot {
      width: 0.5rem;
      height: 0.5rem;
      border-radius: 50%;
      background: var(--kin-primary);
      animation: pulse-dot 2s ease-in-out infinite;
    }

    body.widget-mode .widget-header .widget-title h2 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.625rem;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--kin-on-surface);
      opacity: 0.8;
    }

    body.widget-mode .widget-header .widget-actions {
      display: flex;
      gap: 0.25rem;
    }

    body.widget-mode .widget-header .widget-action-btn {
      display: flex;
      align-items: center;
      gap: 0.25rem;
      background: transparent;
      border: none;
      color: var(--kin-primary);
      padding: 0.25rem 0.5rem;
      font-size: 0.5625rem;
      font-family: 'Space Grotesk', monospace;
      border-radius: 0.25rem;
      cursor: pointer;
      opacity: 0.6;
      transition: all 0.2s;
    }

    body.widget-mode .widget-header .widget-action-btn:hover {
      background: rgba(117, 255, 158, 0.1);
      opacity: 1;
    }

    body.widget-mode .widget-header .widget-action-btn .material-symbols-outlined {
      font-size: 14px;
    }

    .widget-header {
      display: none;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 600;
      color: #f8fafc;
    }

    body.widget-mode h1 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.625rem;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--kin-primary);
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    body.widget-mode h1::before {
      content: '';
      display: inline-block;
      width: 0.5rem;
      height: 0.5rem;
      border-radius: 50%;
      background: var(--kin-primary);
      animation: pulse-dot 2s ease-in-out infinite;
    }

    @keyframes pulse-dot {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .header-actions {
      display: flex;
      gap: 0.375rem;
      align-items: center;
    }

    .refresh-btn, .toggle-btn, .widget-btn, .corner-btn {
      background: rgba(30, 41, 59, 0.8);
      border: 1px solid rgba(51, 65, 85, 0.8);
      color: #94a3b8;
      padding: 0.5rem 1rem;
      border-radius: 0.5rem;
      cursor: pointer;
      font-size: 0.875rem;
      transition: all 0.2s;
    }

    body.widget-mode .refresh-btn,
    body.widget-mode .toggle-btn,
    body.widget-mode .widget-btn,
    body.widget-mode .corner-btn {
      background: transparent;
      border: none;
      color: var(--kin-on-surface-variant);
      padding: 0.25rem 0.5rem;
      font-size: 0.5625rem;
      font-family: 'Space Grotesk', sans-serif;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      border-radius: 0.25rem;
      opacity: 0.6;
    }

    body.widget-mode .refresh-btn:hover,
    body.widget-mode .toggle-btn:hover,
    body.widget-mode .widget-btn:hover {
      background: rgba(117, 255, 158, 0.1);
      color: var(--kin-primary);
      opacity: 1;
    }

    .toggle-btn.active, .widget-btn.active {
      background: #3b82f6;
      border-color: #3b82f6;
      color: white;
    }

    body.widget-mode .widget-btn.active {
      background: rgba(117, 255, 158, 0.1);
      color: var(--kin-primary);
      opacity: 1;
    }

    body.widget-mode .toggle-btn.active {
      background: rgba(117, 255, 158, 0.1);
      color: var(--kin-primary);
      border-color: rgba(117, 255, 158, 0.3);
    }

    .stats {
      display: flex;
      gap: 1rem;
      margin-bottom: 1.5rem;
    }

    body.widget-mode .stats {
      display: none;
    }

    .stat-card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 0.5rem;
      padding: 1rem 1.5rem;
      flex: 1;
    }

    .stat-card .label {
      font-size: 0.75rem;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .stat-card .value {
      font-size: 1.5rem;
      font-weight: 600;
      color: #f8fafc;
      margin-top: 0.25rem;
    }

    .search-box {
      width: 100%;
      padding: 0.75rem 1rem;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 0.5rem;
      color: #e2e8f0;
      font-size: 0.875rem;
      margin-bottom: 1rem;
    }

    body.widget-mode .search-box {
      display: none;
    }

    .search-box::placeholder {
      color: #64748b;
    }

    .search-box:focus {
      outline: none;
      border-color: #3b82f6;
    }

    .port-list {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 0.5rem;
      overflow: hidden;
    }

    body.widget-mode .port-list {
      background: transparent;
      border: none;
      border-radius: 0;
      padding: 0.25rem;
    }

    .port-item {
      display: grid;
      grid-template-columns: 1fr 1.5fr 1fr 1fr auto auto;
      align-items: center;
      padding: 1rem;
      border-bottom: 1px solid #334155;
      transition: background 0.2s;
    }

    body.widget-mode .port-header {
      display: none;
    }

    body.widget-mode .port-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.75rem 1rem;
      border-bottom: none;
      border-radius: 0.5rem;
      margin-bottom: 0;
      background: transparent;
      transition: all 0.2s ease;
    }

    body.widget-mode .port-item:hover {
      background: var(--kin-surface-container-high);
    }

    body.widget-mode .protocol-col {
      display: none;
    }

    .port-item:last-child {
      border-bottom: none;
    }

    .port-item:hover {
      background: #253349;
    }

    .port-item.system-process {
      opacity: 0.6;
    }

    body.widget-mode .port-item.system-process {
      opacity: 0.5;
    }

    .port-item.system-process:hover {
      opacity: 0.8;
    }

    body.widget-mode .port-item.system-process:hover {
      opacity: 0.7;
    }

    .port-header {
      background: #0f172a;
      font-weight: 600;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #64748b;
    }

    body.widget-mode .port-header {
      display: none;
    }

    .port-header:hover {
      background: #0f172a;
    }

    .port-number {
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 0.875rem;
      color: #3b82f6;
    }

    body.widget-mode .port-number {
      display: none;
    }

    .process-name {
      font-size: 0.875rem;
      color: #e2e8f0;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    body.widget-mode .process-name {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.75rem;
      font-weight: 500;
      color: var(--kin-on-surface);
    }

    .system-badge {
      font-size: 0.625rem;
      background: #475569;
      color: #94a3b8;
      padding: 0.125rem 0.375rem;
      border-radius: 0.25rem;
      text-transform: uppercase;
    }

    body.widget-mode .system-badge {
      font-size: 0.4375rem;
      padding: 0.0625rem 0.25rem;
    }

    .pid {
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 0.75rem;
      color: #94a3b8;
    }

    body.widget-mode .pid {
      display: none;
    }

    .protocol {
      font-size: 0.75rem;
      color: #64748b;
    }

    body.widget-mode .protocol {
      display: none;
    }

    .kill-btn {
      background: #dc2626;
      border: none;
      color: white;
      padding: 0.375rem 0.75rem;
      border-radius: 0.375rem;
      cursor: pointer;
      font-size: 0.75rem;
      font-weight: 500;
      transition: all 0.2s;
    }

    .kill-btn:hover {
      background: #ef4444;
    }

    body.widget-mode .kill-btn {
      display: none;
    }

    .kill-btn:disabled {
      background: #475569;
      cursor: not-allowed;
    }

    .kill-btn.system-kill {
      background: #f59e0b;
    }

    .kill-btn.system-kill:hover {
      background: #fbbf24;
    }

    .hide-btn {
      background: transparent;
      border: 1px solid #475569;
      color: #94a3b8;
      padding: 0.375rem 0.5rem;
      border-radius: 0.375rem;
      cursor: pointer;
      font-size: 0.75rem;
      transition: all 0.2s;
      margin-right: 0.5rem;
    }

    .hide-btn:hover {
      background: #475569;
      color: #e2e8f0;
    }

    body.widget-mode .hide-btn {
      display: none;
    }

    body.widget-mode .port-item .port-info {
      display: flex;
      flex-direction: column;
      gap: 0.125rem;
    }

    body.widget-mode .port-item .port-label {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.5625rem;
      letter-spacing: -0.02em;
      text-transform: uppercase;
      color: var(--kin-on-surface-variant);
      opacity: 0.7;
    }

    body.widget-mode .port-item .action-buttons {
      display: flex;
      align-items: center;
      gap: 0.125rem;
      opacity: 0.4;
      transition: opacity 0.2s;
    }

    body.widget-mode .port-item:hover .action-buttons {
      opacity: 1;
    }

    body.widget-mode .port-item .action-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 1.75rem;
      height: 1.75rem;
      border: none;
      border-radius: 0.25rem;
      cursor: pointer;
      transition: all 0.15s;
      background: transparent;
      color: var(--kin-on-surface-variant);
    }

    body.widget-mode .port-item .action-btn:hover {
      background: var(--kin-surface-container-highest);
    }

    body.widget-mode .port-item .action-btn.kill:hover {
      background: rgba(160, 1, 24, 0.2);
      color: var(--kin-secondary);
    }

    body.widget-mode .port-item .action-btn .material-symbols-outlined {
      font-size: 18px;
    }

    body.widget-mode .footer-stats {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1.5rem;
      padding: 0.75rem 1.25rem;
      background: rgba(53, 52, 54, 0.3);
      border-top: 1px solid rgba(59, 74, 61, 0.1);
    }

    body.widget-mode .footer-stat {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.125rem;
    }

    body.widget-mode .footer-stat .stat-label {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.4375rem;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: var(--kin-on-surface-variant);
      opacity: 0.6;
    }

    body.widget-mode .footer-stat .stat-value {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.625rem;
      color: var(--kin-primary);
    }

    body.widget-mode .footer-divider {
      width: 1px;
      height: 1.5rem;
      background: rgba(59, 74, 61, 0.1);
    }

    .hidden-count {
      font-size: 0.75rem;
      color: #64748b;
      padding: 0.5rem 1rem;
      text-align: right;
    }

    body.widget-mode .hidden-count {
      font-size: 0.5rem;
      padding: 0.375rem 1rem;
      text-align: center;
      color: var(--kin-on-surface-variant);
      opacity: 0.5;
    }

    .show-hidden-btn {
      background: transparent;
      border: none;
      color: #3b82f6;
      cursor: pointer;
      font-size: 0.75rem;
      text-decoration: underline;
    }

    body.widget-mode .show-hidden-btn {
      background: transparent;
      border: none;
      color: var(--kin-primary);
      cursor: pointer;
      font-size: 0.5rem;
      text-decoration: underline;
    }

    .empty-state {
      text-align: center;
      padding: 3rem;
      color: #64748b;
    }

    body.widget-mode .empty-state {
      text-align: center;
      padding: 1.5rem;
      color: var(--kin-on-surface-variant);
      opacity: 0.5;
      font-size: 0.625rem;
    }

    .loading {
      text-align: center;
      padding: 2rem;
      color: #64748b;
    }

    body.widget-mode .loading {
      text-align: center;
      padding: 1rem;
      color: var(--kin-on-surface-variant);
      opacity: 0.5;
      font-size: 0.625rem;
    }

    .toast {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      background: #10b981;
      color: white;
      padding: 0.75rem 1.5rem;
      border-radius: 0.5rem;
      font-size: 0.875rem;
      opacity: 0;
      transform: translateY(1rem);
      transition: all 0.3s;
    }

    body.widget-mode .toast {
      bottom: 0.5rem;
      right: 0.5rem;
      padding: 0.375rem 0.75rem;
      font-size: 0.625rem;
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    .toast.error {
      background: #dc2626;
    }

    .corner-dropdown {
      position: relative;
      display: inline-block;
    }

    .corner-menu {
      display: none;
      position: absolute;
      top: 100%;
      right: 0;
      background: rgba(15, 23, 42, 0.95);
      border: 1px solid rgba(51, 65, 85, 0.8);
      border-radius: 0.5rem;
      padding: 0.25rem;
      z-index: 1000;
      min-width: 140px;
      margin-top: 0.25rem;
    }

    .corner-menu.show {
      display: block;
    }

    .corner-menu-item {
      display: block;
      width: 100%;
      padding: 0.5rem 0.75rem;
      background: transparent;
      border: none;
      color: #94a3b8;
      font-size: 0.75rem;
      text-align: left;
      cursor: pointer;
      border-radius: 0.25rem;
      transition: all 0.15s;
    }

    .corner-menu-item:hover {
      background: rgba(51, 65, 85, 0.8);
      color: #e2e8f0;
    }

    .corner-menu-item.active {
      color: #3b82f6;
    }
  </style>
</head>
<body>
  <div class="container">
    <header id="widgetHeader">
      <h1>Local Port Dashboard</h1>
      <div class="header-actions">
        <div class="corner-dropdown">
          <button class="corner-btn" id="cornerBtn" onclick="toggleCornerMenu()" title="Position widget">⊞</button>
          <div class="corner-menu" id="cornerMenu">
            <button class="corner-menu-item" onclick="setCorner('top-left')">↖ Top Left</button>
            <button class="corner-menu-item" onclick="setCorner('top-right')">↗ Top Right</button>
            <button class="corner-menu-item" onclick="setCorner('bottom-left')">↙ Bottom Left</button>
            <button class="corner-menu-item" onclick="setCorner('bottom-right')">↘ Bottom Right</button>
          </div>
        </div>
        <button class="widget-btn" id="widgetToggle" onclick="toggleWidgetMode()">Widget</button>
        <button class="toggle-btn" id="systemToggle" onclick="toggleSystemProcesses()">Show System</button>
        <button class="refresh-btn" onclick="loadPorts()">Refresh</button>
      </div>
    </header>

    <div class="widget-header" id="widgetHeaderInner">
      <div class="widget-title">
        <div class="pulse-dot"></div>
        <h2>Active_Processes</h2>
      </div>
      <div class="widget-actions">
        <button class="widget-action-btn" onclick="loadPorts()" title="Refresh">
          <span class="material-symbols-outlined">refresh</span>
          <span>Refresh</span>
        </button>
        <button class="widget-action-btn" onclick="toggleSystemProcesses()" id="systemToggleWidget" title="Toggle System">
          <span class="material-symbols-outlined">visibility</span>
          <span>System</span>
        </button>
      </div>
    </div>

    <div class="stats">
      <div class="stat-card">
        <div class="label">Active Ports</div>
        <div class="value" id="totalPorts">-</div>
      </div>
      <div class="stat-card">
        <div class="label">Unique Processes</div>
        <div class="value" id="uniqueProcesses">-</div>
      </div>
    </div>

    <input type="text" class="search-box" id="searchBox" placeholder="Search by port, process, or PID..." oninput="filterPorts()">

    <div class="port-list" id="portList">
      <div class="loading">Loading ports...</div>
    </div>
    <div class="hidden-count" id="hiddenCount"></div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    let allPorts = [];
    let showSystem = false;
    let widgetMode = localStorage.getItem('widgetMode') === 'true';
    let hiddenPids = JSON.parse(localStorage.getItem('hiddenPids') || '[]');
    let showHidden = false;
    let widgetCorner = localStorage.getItem('widgetCorner') || 'bottom-right';

    if (widgetMode) {
      document.body.classList.add('widget-mode');
      document.getElementById('widgetToggle').classList.add('active');
    }

    async function loadPorts() {
      const portList = document.getElementById('portList');
      portList.innerHTML = '<div class="loading">Loading ports...</div>';

      try {
        const response = await fetch(`/api/ports?showSystem=${showSystem}`);
        allPorts = await response.json();
        renderPorts(allPorts);
      } catch (error) {
        portList.innerHTML = '<div class="empty-state">Failed to load ports</div>';
        showToast('Error loading ports', true);
      }
    }

    function isHidden(port) {
      return hiddenPids.includes(port.pid);
    }

    function renderPorts(ports) {
      const portList = document.getElementById('portList');
      const hiddenCountEl = document.getElementById('hiddenCount');

      const visiblePorts = showHidden ? ports : ports.filter(p => !isHidden(p));
      const hiddenPorts = ports.filter(p => isHidden(p));

      if (visiblePorts.length === 0 && hiddenPorts.length === 0) {
        portList.innerHTML = '<div class="empty-state">No active ports found</div>';
        document.getElementById('totalPorts').textContent = '0';
        document.getElementById('uniqueProcesses').textContent = '0';
        hiddenCountEl.innerHTML = '';
        return;
      }

      const uniqueProcesses = new Set(visiblePorts.map(p => p.processName)).size;
      document.getElementById('totalPorts').textContent = visiblePorts.length;
      document.getElementById('uniqueProcesses').textContent = uniqueProcesses;

      if (widgetMode) {
        let html = '';

        for (const port of visiblePorts) {
          const systemClass = port.isSystem ? 'system-process' : '';
          const isPidHidden = hiddenPids.includes(port.pid);

          html += `
            <div class="port-item ${systemClass}">
              <div class="port-info">
                <span class="process-name">${port.processName}</span>
                <span class="port-label">Port: ${port.port}</span>
              </div>
              <div class="action-buttons">
                <button class="action-btn" onclick="hideProcess(${port.pid}, '${port.processName.replace(/'/g, "\\'")}')" title="Hide">
                  <span class="material-symbols-outlined" style="font-size: 18px;">${isPidHidden ? 'visibility_off' : 'visibility'}</span>
                </button>
                <button class="action-btn kill" onclick="killPort(${port.pid}, ${port.isSystem})" title="Kill">
                  <span class="material-symbols-outlined" style="font-size: 18px;">close</span>
                </button>
              </div>
            </div>
          `;
        }

        portList.innerHTML = html;

        const footerHtml = `
          <div class="footer-stats">
            <div class="footer-stat">
              <span class="stat-label">Ports</span>
              <span class="stat-value">${visiblePorts.length}</span>
            </div>
            <div class="footer-divider"></div>
            <div class="footer-stat">
              <span class="stat-label">Processes</span>
              <span class="stat-value">${uniqueProcesses}</span>
            </div>
          </div>
        `;

        if (hiddenPorts.length > 0) {
          portList.innerHTML += `<div class="hidden-count">${hiddenPorts.length} hidden — <button class="show-hidden-btn" onclick="toggleShowHidden()">Show</button></div>`;
        }

        portList.innerHTML += footerHtml;
      } else {
        let html = `
          <div class="port-item port-header">
            <div>Port</div>
            <div>Process</div>
            <div>PID</div>
            <div class="protocol-col">Protocol</div>
            <div></div>
            <div></div>
          </div>
        `;

        for (const port of visiblePorts) {
          const systemClass = port.isSystem ? 'system-process' : '';
          const badge = port.isSystem ? '<span class="system-badge">System</span>' : '';
          const killClass = port.isSystem ? 'system-kill' : '';
          const killText = port.isSystem ? 'Force Kill' : 'Kill';

          html += `
            <div class="port-item ${systemClass}">
              <div class="port-number">:${port.port}</div>
              <div class="process-name">${port.processName} ${badge}</div>
              <div class="pid">${port.pid}</div>
              <div class="protocol protocol-col">${port.protocol}</div>
              <button class="hide-btn" onclick="hideProcess(${port.pid}, '${port.processName.replace(/'/g, "\\'")}')">Hide</button>
              <button class="kill-btn ${killClass}" onclick="killPort(${port.pid}, ${port.isSystem})">${killText}</button>
            </div>
          `;
        }

        portList.innerHTML = html;

        if (hiddenPorts.length > 0) {
          hiddenCountEl.innerHTML = `${hiddenPorts.length} hidden — <button class="show-hidden-btn" onclick="toggleShowHidden()">Show</button>`;
        } else {
          hiddenCountEl.innerHTML = '';
        }
      }
    }

    function hideProcess(pid, name) {
      if (!hiddenPids.includes(pid)) {
        hiddenPids.push(pid);
        localStorage.setItem('hiddenPids', JSON.stringify(hiddenPids));
        showToast(`${name} (PID ${pid}) hidden`);
        filterPorts();
      }
    }

    function toggleShowHidden() {
      showHidden = !showHidden;
      filterPorts();
    }

    function filterPorts() {
      const query = document.getElementById('searchBox').value.toLowerCase();
      const basePorts = showHidden ? allPorts : allPorts.filter(p => !isHidden(p));
      const filtered = basePorts.filter(port =>
        port.port.toString().includes(query) ||
        port.processName.toLowerCase().includes(query) ||
        port.pid.toString().includes(query)
      );
      renderPorts(filtered);
    }

    function toggleSystemProcesses() {
      showSystem = !showSystem;
      const btn = document.getElementById('systemToggle');
      if (btn) {
        btn.classList.toggle('active', showSystem);
        btn.textContent = showSystem ? 'Hide System' : 'Show System';
      }
      const widgetBtn = document.getElementById('systemToggleWidget');
      if (widgetBtn) {
        widgetBtn.style.opacity = showSystem ? '1' : '0.6';
      }
      loadPorts();
    }

    function toggleWidgetMode() {
      widgetMode = !widgetMode;
      localStorage.setItem('widgetMode', widgetMode);
      document.body.classList.toggle('widget-mode', widgetMode);
      document.getElementById('widgetToggle').classList.toggle('active', widgetMode);

      try {
        const { ipcRenderer } = require('electron');
        ipcRenderer.send('set-widget-mode', widgetMode);
      } catch (e) {}

      renderPorts(allPorts);
    }

    function toggleCornerMenu() {
      const menu = document.getElementById('cornerMenu');
      menu.classList.toggle('show');
    }

    function setCorner(corner) {
      widgetCorner = corner;
      localStorage.setItem('widgetCorner', corner);
      document.getElementById('cornerMenu').classList.remove('show');

      try {
        const { ipcRenderer } = require('electron');
        ipcRenderer.send('set-widget-corner', corner);
      } catch (e) {}

      document.querySelectorAll('.corner-menu-item').forEach(item => {
        item.classList.remove('active');
      });
      event.target.classList.add('active');
    }

    document.addEventListener('click', (e) => {
      if (!e.target.closest('.corner-dropdown')) {
        document.getElementById('cornerMenu').classList.remove('show');
      }
    });

    async function killPort(pid, isSystem = false) {
      const msg = isSystem
        ? `Force kill system process ${pid}? This may affect system stability.`
        : `Kill process ${pid}?`;

      if (!confirm(msg)) return;

      try {
        const response = await fetch(`/api/kill/${pid}`, { method: 'POST' });
        const result = await response.json();

        if (result.success) {
          showToast(`Process ${pid} killed`);
          hiddenPids = hiddenPids.filter(p => p !== pid);
          localStorage.setItem('hiddenPids', JSON.stringify(hiddenPids));
          loadPorts();
        } else {
          showToast(result.error || 'Failed to kill process', true);
        }
      } catch (error) {
        showToast('Error killing process', true);
      }
    }

    function showToast(message, isError = false) {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.className = 'toast show' + (isError ? ' error' : '');

      setTimeout(() => {
        toast.classList.remove('show');
      }, 3000);
    }

    let dragStart = null;
    let dragThreshold = 5;

    document.addEventListener('mousedown', (e) => {
      if (widgetMode && e.target.closest('#widgetHeaderInner')) {
        dragStart = { x: e.screenX, y: e.screenY };
      }
    });

    document.addEventListener('mouseup', (e) => {
      if (dragStart && widgetMode) {
        const dx = Math.abs(e.screenX - dragStart.x);
        const dy = Math.abs(e.screenY - dragStart.y);
        if (dx > dragThreshold || dy > dragThreshold) {
          try {
            const { ipcRenderer } = require('electron');
            ipcRenderer.send('widget-dragged');
          } catch (e) {}
        }
      }
      dragStart = null;
    });

    loadPorts();
  </script>
</body>
</html>
